<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Form Builder</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="container">
      <form onsubmit="">
        <label>First Name</label>
        <input type="text" placeholder="Enter your First Name" />

        <label>Middle Name</label>
        <input type="text" placeholder="Enter your Middle Name" />

        <label>Last Name</label>
        <input type="text" placeholder="Enter your Last Name" />

        <label>Roll No</label>
        <input type="text" placeholder="Enter Roll Number" />

        <label>Email</label>
        <input type="email" placeholder="Enter your Email" />

        <label>Phone Number</label>
        <input type="tel" placeholder="Enter your mobile number" />

        <label>Date of Birth</label>
        <input type="date" />

        <label>Gender</label>
        <select>
          <option>Male</option>
          <option>Female</option>
          <option>Other</option>
        </select>

        <label>Address</label>
        <textarea placeholder="Enter your address"> </textarea>

        <label>City</label>
        <input type="text" placeholder="Enter your City name" />

        <label>State</label>
        <input type="State" placeholder="Enter your state name" />

        <label>Pincode</label>
        <input type="text" placeholder="Enter your pincode" />

        <label>College Name</label>
        <input type="text" placeholder="Enter your college name" />

        <label>Parent/Guardian Name</label>
        <input type="text" placeholder="Enter your parent/guardian name" />

        <button>Submit</button>
      </form>
    </div>
  </body>
</html>
